listen_addresses: "0.0.0.0:${PORT}"
worker_processes: 4
cache_size_mb: 256
preferred_encoding: gzip
web_ui: ${MARTIN_WEB_UI:-disable}
on_invalid: abort

postgres:
  connection_string: ${DATABASE_URL}
  default_srid: 4326
  pool_size: 20
  auto_bounds: quick

  auto_publish:
    from_schemas:
      - ${MARTIN_PUBLISH_SCHEMA:-public}
    tables:
      source_id_format: "table.{schema}.{table}.{column}"
      clip_geom: true
      buffer: 64
      extent: 4096
    functions:
      source_id_format: "{schema}.{function}"
